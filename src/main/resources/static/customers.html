<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwagSoundShop — Клиенты</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo"><span>панель управления</span>SwagSoundShop</div>
        <nav class="sidebar-nav">
            <a href="/dashboard.html" class="nav-item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Дашборд
            </a>
            <a href="/products.html" class="nav-item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                Товары
            </a>
            <a href="/orders.html" class="nav-item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                Заказы
            </a>
            <a href="/payments.html" class="nav-item" id="nav-payments">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
                Платежи
            </a>
            <a href="/customers.html" class="nav-item active">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Клиенты
            </a>
            <a href="/employees.html" class="nav-item" id="nav-employees">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                Сотрудники
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user" id="sidebar-user"></div>
            <button class="btn-logout" onclick="logout()">Выйти</button>
        </div>
    </aside>

    <main class="main">
        <div class="page-header">
            <h1 class="page-title">Клиенты</h1>
            <p class="page-subtitle">База клиентов магазина</p>
        </div>

        <div class="card">
            <div class="toolbar">
                <div class="filters">
                    <div class="form-group">
                        <input class="form-control" id="search" placeholder="Поиск..." oninput="filterCustomers()">
                    </div>
                </div>
                <button class="btn btn-primary" onclick="openModal()">+ Добавить клиента</button>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Имя</th>
                        <th>Email</th>
                        <th>Телефон</th>
                        <th>Дата регистрации</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody id="customers-table"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <div class="modal-title" id="modal-title">Добавить клиента</div>
        <input type="hidden" id="customer-id">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="form-group">
                <label class="form-label">Имя</label>
                <input class="form-control" id="customer-firstname" placeholder="Иван">
            </div>
            <div class="form-group">
                <label class="form-label">Фамилия</label>
                <input class="form-control" id="customer-lastname" placeholder="Иванов">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-control" id="customer-email" type="email" placeholder="ivan@mail.ru">
        </div>
        <div class="form-group">
            <label class="form-label">Телефон</label>
            <input class="form-control" id="customer-phone" placeholder="+79001234567">
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
            <button class="btn btn-primary" onclick="saveCustomer()">Сохранить</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="/api.js"></script>
<script>
    checkAuth();
    if (hasRole('SELLER')) {
        document.getElementById('nav-payments')?.remove();
        document.getElementById('nav-employees')?.remove();
    }
    document.getElementById('sidebar-user').textContent = localStorage.getItem('email');
    const canEditCustomers = hasRole('ADMIN', 'MANAGER');
    if (!canEditCustomers) {
        document.querySelector('button[onclick="openModal()"]').style.display = 'none';
    }
    let allCustomers = [];

    function showToast(msg, type = 'success') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `toast ${type} show`;
        setTimeout(() => t.className = 'toast', 3000);
    }

    async function loadCustomers() {
        allCustomers = await get('/customers') || [];
        renderCustomers(allCustomers);
    }

    function filterCustomers() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = allCustomers.filter(c =>
            `${c.firstName} ${c.lastName} ${c.email} ${c.phone}`.toLowerCase().includes(q)
        );
        renderCustomers(filtered);
    }

    function renderCustomers(customers) {
        const tbody = document.getElementById('customers-table');
        if (!customers.length) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted)">Клиентов нет</td></tr>';
            return;
        }
        tbody.innerHTML = customers.map(c => `
        <tr>
            <td style="color:var(--text-muted)">#${c.id}</td>
            <td><strong>${c.firstName} ${c.lastName}</strong></td>
            <td>${c.email}</td>
            <td>${c.phone || '—'}</td>
            <td style="color:var(--text-muted);font-size:13px">${new Date(c.createdAt).toLocaleDateString('ru')}</td>
            <td>
                <div style="display:flex;gap:8px">
                    ${canEditCustomers ? `<button class="btn btn-secondary btn-sm" onclick="editCustomer(${c.id})">Изменить</button>` : ''}
                    ${canEditCustomers ? `<button class="btn btn-danger btn-sm" onclick="deleteCustomer(${c.id})">Удалить</button>` : ''}
                    ${!canEditCustomers ? '<span style="color:var(--text-muted);font-size:13px">Только просмотр</span>' : ''}
                </div>
            </td>
        </tr>
    `).join('');
    }

    function openModal(customer = null) {
        document.getElementById('modal-title').textContent = customer ? 'Редактировать клиента' : 'Добавить клиента';
        document.getElementById('customer-id').value = customer?.id || '';
        document.getElementById('customer-firstname').value = customer?.firstName || '';
        document.getElementById('customer-lastname').value = customer?.lastName || '';
        document.getElementById('customer-email').value = customer?.email || '';
        document.getElementById('customer-phone').value = customer?.phone || '';
        document.getElementById('modal').classList.add('open');
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('open');
    }

    function editCustomer(id) {
        const c = allCustomers.find(c => c.id === id);
        if (c) openModal(c);
    }

    async function saveCustomer() {
        const id = document.getElementById('customer-id').value;
        const body = {
            firstName: document.getElementById('customer-firstname').value,
            lastName: document.getElementById('customer-lastname').value,
            email: document.getElementById('customer-email').value,
            phone: document.getElementById('customer-phone').value
        };

        if (!body.firstName || !body.lastName || !body.email) {
            showToast('Заполните обязательные поля', 'error');
            return;
        }

        if (id) {
            await put(`/customers/${id}`, body);
            showToast('Клиент обновлён');
        } else {
            await post('/customers', body);
            showToast('Клиент добавлен');
        }

        closeModal();
        loadCustomers();
    }

    async function deleteCustomer(id) {
        if (!confirm('Удалить клиента?')) return;
        await del(`/customers/${id}`);
        showToast('Клиент удалён');
        loadCustomers();
    }

    document.getElementById('modal').addEventListener('click', e => {
        if (e.target === document.getElementById('modal')) closeModal();
    });

    loadCustomers();
</script>
</body>
</html>
