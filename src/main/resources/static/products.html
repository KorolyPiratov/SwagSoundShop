<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwagSoundShop — Товары</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo"><span>панель управления</span>SwagSoundShop</div>
        <nav class="sidebar-nav">
            <a href="/dashboard.html" class="nav-item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Дашборд
            </a>
            <a href="/products.html" class="nav-item active">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                Товары
            </a>
            <a href="/orders.html" class="nav-item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                Заказы
            </a>
            <a href="/payments.html" class="nav-item" id="nav-payments">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
                Платежи
            </a>
            <a href="/customers.html" class="nav-item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Клиенты
            </a>
            <a href="/employees.html" class="nav-item" id="nav-employees">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                Сотрудники
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user" id="sidebar-user"></div>
            <button class="btn-logout" onclick="logout()">Выйти</button>
        </div>
    </aside>

    <main class="main">
        <div class="page-header">
            <h1 class="page-title">Товары</h1>
            <p class="page-subtitle">Управление каталогом товаров</p>
        </div>

        <div class="card">
            <div class="toolbar">
                <div class="filters">
                    <div class="form-group">
                        <input class="form-control" id="search" placeholder="Поиск по названию..." oninput="loadProducts()">
                    </div>
                    <div class="form-group">
                        <select class="form-control" id="filter-category" onchange="loadProducts()">
                            <option value="">Все категории</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <input class="form-control" id="filter-min" type="number" placeholder="Цена от" oninput="loadProducts()">
                    </div>
                    <div class="form-group">
                        <input class="form-control" id="filter-max" type="number" placeholder="Цена до" oninput="loadProducts()">
                    </div>
                </div>
                <button class="btn btn-primary" onclick="openModal()">+ Добавить товар</button>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Название</th>
                        <th>Категория</th>
                        <th>Цена</th>
                        <th>Остаток</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody id="products-table"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <div class="modal-title" id="modal-title">Добавить товар</div>
        <input type="hidden" id="product-id">
        <div class="form-group">
            <label class="form-label">Название</label>
            <input class="form-control" id="product-name" placeholder="Fender Stratocaster">
        </div>
        <div class="form-group">
            <label class="form-label">Описание</label>
            <input class="form-control" id="product-desc" placeholder="Описание товара">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="form-group">
                <label class="form-label">Цена (₽)</label>
                <input class="form-control" id="product-price" type="number" placeholder="89999">
            </div>
            <div class="form-group">
                <label class="form-label">Остаток</label>
                <input class="form-control" id="product-stock" type="number" placeholder="5">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Категория</label>
            <select class="form-control" id="product-category"></select>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
            <button class="btn btn-primary" onclick="saveProduct()">Сохранить</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>


<script src="/api.js"></script>
<script>
    checkAuth();
    if (hasRole('SELLER')) {
        document.getElementById('nav-payments')?.remove();
        document.getElementById('nav-employees')?.remove();
    }
    document.getElementById('sidebar-user').textContent = localStorage.getItem('email');

    const canEditProducts = hasRole('ADMIN', 'MANAGER');
    if (!canEditProducts) {
        document.querySelector('button[onclick="openModal()"]').style.display = 'none';
    }
    let categories = [];

    function showToast(msg, type = 'success') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `toast ${type} show`;
        setTimeout(() => t.className = 'toast', 3000);
    }

    async function loadCategories() {
        categories = await get('/categories') || [];
        const sel = document.getElementById('filter-category');
        const sel2 = document.getElementById('product-category');

        const leafCats = categories.filter(c =>
            !categories.some(ch => ch.parent?.id === c.id)
        );

        leafCats.forEach(c => {
            sel.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            sel2.innerHTML += `<option value="${c.id}">${c.name}</option>`;
        });
    }

    async function loadProducts() {
        const name = document.getElementById('search').value;
        const categoryId = document.getElementById('filter-category').value;
        const minPrice = document.getElementById('filter-min').value;
        const maxPrice = document.getElementById('filter-max').value;

        let url = '/products?';
        if (name) url += `name=${encodeURIComponent(name)}&`;
        if (categoryId) url += `categoryId=${categoryId}&`;
        if (minPrice) url += `minPrice=${minPrice}&`;
        if (maxPrice) url += `maxPrice=${maxPrice}&`;

        const products = await get(url) || [];
        const tbody = document.getElementById('products-table');

        if (!products.length) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted)">Товары не найдены</td></tr>';
            return;
        }

        tbody.innerHTML = products.map(p => `
        <tr>
            <td style="color:var(--text-muted)">#${p.id}</td>
            <td><strong>${p.name}</strong><br><span style="font-size:12px;color:var(--text-muted)">${p.description || ''}</span></td>
            <td>${p.category?.name || '—'}</td>
            <td><strong>${Number(p.price).toLocaleString('ru')} ₽</strong></td>
            <td>
                <span style="color:${p.stockQuantity > 0 ? 'var(--text)' : 'var(--tomato)'}">
                    ${p.stockQuantity} шт.
                </span>
            </td>
            <td>
                <div style="display:flex;gap:8px">
                    ${canEditProducts ? `<button class="btn btn-secondary btn-sm" onclick="editProduct(${p.id})">Изменить</button>` : ''}
                    ${canEditProducts ? `<button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">Удалить</button>` : ''}
                    ${!canEditProducts ? '<span style="color:var(--text-muted);font-size:13px">Только просмотр</span>' : ''}
                </div>
            </td>
        </tr>
    `).join('');
    }

    function openModal(product = null) {
        document.getElementById('modal-title').textContent = product ? 'Редактировать товар' : 'Добавить товар';
        document.getElementById('product-id').value = product?.id || '';
        document.getElementById('product-name').value = product?.name || '';
        document.getElementById('product-desc').value = product?.description || '';
        document.getElementById('product-price').value = product?.price || '';
        document.getElementById('product-stock').value = product?.stockQuantity || '';
        document.getElementById('product-category').value = product?.category?.id || '';
        document.getElementById('modal').classList.add('open');
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('open');
    }

    async function editProduct(id) {
        const p = await get(`/products/${id}`);
        openModal(p);
    }

    async function saveProduct() {
        const id = document.getElementById('product-id').value;
        const body = {
            name: document.getElementById('product-name').value,
            description: document.getElementById('product-desc').value,
            price: parseFloat(document.getElementById('product-price').value),
            stockQuantity: parseInt(document.getElementById('product-stock').value) || 0,
            categoryId: parseInt(document.getElementById('product-category').value)
        };

        if (!body.name || !body.price || !body.categoryId || isNaN(parseInt(document.getElementById('product-stock').value))) {
            showToast('Заполните все обязательные поля', 'error');
            return;
        }

        if (id) {
            await put(`/products/${id}`, body);
            showToast('Товар обновлён');
        } else {
            await post('/products', body);
            showToast('Товар добавлен');
        }

        closeModal();
        loadProducts();
    }

    async function deleteProduct(id) {
        if (!confirm('Удалить товар?')) return;
        await del(`/products/${id}`);
        showToast('Товар удалён');
        loadProducts();
    }

    document.getElementById('modal').addEventListener('click', e => {
        if (e.target === document.getElementById('modal')) closeModal();
    });

    loadCategories().then(() => loadProducts());
</script>
</body>
</html>
