<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwagSoundShop — Товар</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        body { background: var(--honeydew); }
        .navbar { background: white; padding: 0 48px; display: flex; align-items: center; justify-content: space-between; height: 64px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .navbar-logo { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--tomato); text-decoration: none; }
        .navbar-links { display: flex; gap: 32px; list-style: none; }
        .navbar-links a { text-decoration: none; color: var(--text); font-size: 14px; font-weight: 500; transition: color 0.2s; }
        .navbar-links a:hover { color: var(--tomato); }
        .cart-btn { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--tomato); color: white; border-radius: var(--radius-sm); text-decoration: none; font-size: 14px; font-weight: 500; transition: background 0.2s; }
        .cart-btn:hover { background: #b02e30; }
        .cart-count { background: var(--peach); color: var(--text); border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
        .breadcrumbs { padding: 24px 48px 0; font-size: 13px; color: var(--text-muted); }
        .breadcrumbs a { color: var(--coral); text-decoration: none; transition: color 0.2s; }
        .breadcrumbs a:hover { color: var(--tomato); }
        .product-container { max-width: 1200px; margin: 40px auto; padding: 0 48px; }
        .product-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; background: white; border-radius: var(--radius); padding: 48px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .product-image-section { position: relative; }
        .product-image { width: 100%; height: 500px; background: linear-gradient(135deg, var(--honeydew), var(--peach)); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 120px; border: 2px solid var(--border); }
        .btn-favorite { position: absolute; top: 16px; right: 16px; width: 48px; height: 48px; border-radius: 50%; background: white; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; transition: all 0.2s; z-index: 10; }
        .btn-favorite:hover { background: var(--honeydew); border-color: var(--coral); }
        .btn-favorite.active { background: var(--tomato); border-color: var(--tomato); color: white; }
        .product-info { display: flex; flex-direction: column; }
        .product-category-badge { display: inline-block; padding: 6px 12px; background: var(--honeydew); color: var(--coral); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; border-radius: 20px; width: fit-content; margin-bottom: 16px; }
        .product-title { font-family: 'Playfair Display', serif; font-size: 36px; color: var(--text); margin-bottom: 16px; line-height: 1.2; }
        .product-price { font-family: 'Playfair Display', serif; font-size: 42px; color: var(--tomato); margin-bottom: 24px; }
        .product-stock { display: flex; align-items: center; gap: 8px; font-size: 14px; margin-bottom: 32px; padding: 12px 16px; background: var(--honeydew); border-radius: var(--radius-sm); width: fit-content; }
        .product-stock.in-stock { color: #16a34a; }
        .product-stock.out-of-stock { color: var(--tomato); background: #fee2e2; }
        .product-description { font-size: 15px; line-height: 1.7; color: var(--text); margin-bottom: 32px; padding-bottom: 32px; border-bottom: 1px solid var(--border); }
        .quantity-selector { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
        .quantity-label { font-size: 14px; font-weight: 600; color: var(--text); }
        .quantity-controls { display: flex; align-items: center; gap: 12px; border: 2px solid var(--border); border-radius: var(--radius-sm); padding: 4px; }
        .qty-btn { width: 36px; height: 36px; border: none; background: var(--honeydew); border-radius: 6px; cursor: pointer; font-size: 18px; font-weight: 600; color: var(--text); display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .qty-btn:hover { background: var(--peach); color: var(--tomato); }
        .qty-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .qty-value { font-weight: 600; font-size: 16px; min-width: 40px; text-align: center; }
        .product-actions { display: flex; gap: 12px; margin-bottom: 32px; }
        .btn-add-to-cart { flex: 1; padding: 16px 32px; background: var(--tomato); color: white; border: none; border-radius: var(--radius-sm); font-size: 16px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-add-to-cart:hover { background: #b02e30; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(201,54,56,0.2); }
        .btn-add-to-cart:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .product-meta { display: grid; gap: 12px; padding: 24px; background: var(--honeydew); border-radius: var(--radius-sm); }
        .meta-item { display: flex; justify-content: space-between; font-size: 14px; }
        .meta-label { color: var(--text-muted); font-weight: 500; }
        .meta-value { color: var(--text); font-weight: 600; }
        .product-tabs { margin-top: 60px; }
        .tabs-header { display: flex; gap: 32px; border-bottom: 2px solid var(--border); margin-bottom: 32px; }
        .tab-btn { padding: 12px 0; background: none; border: none; font-size: 16px; font-weight: 600; color: var(--text-muted); cursor: pointer; font-family: 'DM Sans', sans-serif; position: relative; transition: color 0.2s; }
        .tab-btn.active { color: var(--tomato); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px; background: var(--tomato); }
        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .specs-table { width: 100%; border-collapse: separate; border-spacing: 0; }
        .specs-table tr { border-bottom: 1px solid var(--border); }
        .specs-table td { padding: 16px 0; font-size: 14px; }
        .specs-table td:first-child { color: var(--text-muted); font-weight: 500; width: 200px; }
        .specs-table td:last-child { color: var(--text); font-weight: 600; }
        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--tomato); color: white; padding: 14px 20px; border-radius: var(--radius-sm); font-size: 14px; z-index: 9999; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: #16a34a; }
        .loading { text-align: center; padding: 100px 20px; color: var(--text-muted); }
        @media (max-width: 768px) {
            .product-layout { grid-template-columns: 1fr; gap: 32px; padding: 24px; }
            .product-container { padding: 0 20px; }
            .breadcrumbs { padding: 16px 20px 0; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="/index.html" class="navbar-logo">SwagSoundShop</a>
    <ul class="navbar-links">
        <li><a href="/index.html">Главная</a></li>
        <li><a href="/catalog.html">Каталог</a></li>
        <li><a href="/customer-login.html" id="profile-link">Войти</a></li>
    </ul>
    <div>
        <a href="/cart.html" class="cart-btn">
            🛒 Корзина
            <span class="cart-count" id="cart-count">0</span>
        </a>
    </div>
</nav>

<div class="breadcrumbs" id="breadcrumbs">
    <a href="/index.html">Главная</a> /
    <a href="/catalog.html">Каталог</a> /
    <span id="breadcrumb-category">Загрузка...</span> /
    <span id="breadcrumb-product">Загрузка...</span>
</div>

<div class="product-container">
    <div id="product-content">
        <div class="loading">Загрузка товара...</div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const categoryIcons = {
        'Гитары': '🎸', 'Клавишные': '🎹', 'Ударные': '🥁',
        'Аксессуары': '🎧', 'Акустические': '🎵', 'Электрогитары': '⚡',
        'Синтезаторы': '🎛️', 'Пианино': '🎹'
    };

    const customerToken = localStorage.getItem('customer_token');
    let currentProduct = null;
    let quantity = 1;
    let isFav = false;

    function getProductId() {
        return new URLSearchParams(window.location.search).get('id');
    }

    function getCart() { return JSON.parse(localStorage.getItem('cart') || '[]'); }
    function saveCart(cart) { localStorage.setItem('cart', JSON.stringify(cart)); updateCartCount(); }
    function updateCartCount() {
        const count = getCart().reduce((s, i) => s + i.quantity, 0);
        document.getElementById('cart-count').textContent = count;
    }

    function showToast(msg, type = 'success') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `toast ${type} show`;
        setTimeout(() => t.className = 'toast', 3000);
    }

    // ── Избранное ──────────────────────────────────────────────
    async function loadFavoriteStatus(productId) {
        if (!customerToken) return;
        try {
            const res = await fetch('http://localhost:8080/api/customer-auth/favorites', {
                headers: { 'Authorization': 'Bearer ' + customerToken }
            });
            const favs = await res.json();
            isFav = favs.some(f => f.product?.id === productId);
            renderFavoriteButton();
        } catch (e) {}
    }

    function renderFavoriteButton() {
        const btn = document.getElementById('favorite-btn');
        if (!btn) return;
        btn.className = 'btn-favorite' + (isFav ? ' active' : '');
        btn.innerHTML = isFav ? '❤️' : '🤍';
    }

    async function toggleFavorite(productId) {
        if (!customerToken) {
            window.location.href = '/customer-login.html';
            return;
        }
        try {
            if (isFav) {
                await fetch(`http://localhost:8080/api/customer-auth/favorites/${productId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + customerToken }
                });
                isFav = false;
                showToast('Удалено из избранного');
            } else {
                await fetch(`http://localhost:8080/api/customer-auth/favorites/${productId}`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + customerToken }
                });
                isFav = true;
                showToast('Добавлено в избранное', 'success');
            }
            renderFavoriteButton();
        } catch (e) {
            showToast('Ошибка', 'error');
        }
    }
    // ──────────────────────────────────────────────────────────

    function addToCart() {
        if (!currentProduct || quantity < 1) return;
        const cart = getCart();
        const existing = cart.find(i => i.id === currentProduct.id);
        if (existing) existing.quantity += quantity;
        else cart.push({ id: currentProduct.id, name: currentProduct.name, price: currentProduct.price, quantity });
        saveCart(cart);
        showToast(`${currentProduct.name} добавлен в корзину (${quantity} шт.)`, 'success');
        quantity = 1;
        document.getElementById('qty-value').textContent = quantity;
    }

    function changeQuantity(delta) {
        const newQty = quantity + delta;
        if (newQty >= 1 && newQty <= currentProduct.stockQuantity) {
            quantity = newQty;
            document.getElementById('qty-value').textContent = quantity;
        }
    }

    function switchTab(tabName) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabName));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.dataset.tab === tabName));
    }

    async function loadProduct() {
        const productId = getProductId();
        if (!productId) {
            document.getElementById('product-content').innerHTML = '<div class="loading">Товар не найден</div>';
            return;
        }
        try {
            const response = await fetch(`http://localhost:8080/api/products/${productId}`);
            if (!response.ok) throw new Error('Товар не найден');
            currentProduct = await response.json();
            renderProduct();
            updateCartCount();
        } catch (error) {
            document.getElementById('product-content').innerHTML = `<div class="loading">Ошибка: ${error.message}</div>`;
        }
    }

    function renderProduct() {
        const p = currentProduct;
        const icon = categoryIcons[p.category?.name] || '🎵';
        const inStock = p.stockQuantity > 0;

        document.getElementById('breadcrumb-category').textContent = p.category?.name || 'Категория';
        document.getElementById('breadcrumb-product').textContent = p.name;

        document.getElementById('product-content').innerHTML = `
            <div class="product-layout">
                <div class="product-image-section">
                    <div class="product-image">${icon}</div>
                    <button class="btn-favorite" id="favorite-btn" onclick="toggleFavorite(${p.id})">🤍</button>
                </div>
                <div class="product-info">
                    <div class="product-category-badge">${p.category?.name || 'Товар'}</div>
                    <h1 class="product-title">${p.name}</h1>
                    <div class="product-price">${Number(p.price).toLocaleString('ru')} ₽</div>
                    <div class="product-stock ${inStock ? 'in-stock' : 'out-of-stock'}">
                        ${inStock ? `✓ В наличии: ${p.stockQuantity} шт.` : '✕ Нет в наличии'}
                    </div>
                    <div class="product-description">${p.description || 'Описание товара отсутствует.'}</div>
                    ${inStock ? `
                        <div class="quantity-selector">
                            <span class="quantity-label">Количество:</span>
                            <div class="quantity-controls">
                                <button class="qty-btn" onclick="changeQuantity(-1)" ${quantity <= 1 ? 'disabled' : ''}>−</button>
                                <span class="qty-value" id="qty-value">${quantity}</span>
                                <button class="qty-btn" onclick="changeQuantity(1)" ${quantity >= p.stockQuantity ? 'disabled' : ''}>+</button>
                            </div>
                        </div>
                        <div class="product-actions">
                            <button class="btn-add-to-cart" onclick="addToCart()">🛒 Добавить в корзину</button>
                        </div>
                    ` : `
                        <div class="product-actions">
                            <button class="btn-add-to-cart" disabled>Товар отсутствует</button>
                        </div>
                    `}
                    <div class="product-meta">
                        <div class="meta-item"><span class="meta-label">Артикул:</span><span class="meta-value">#${p.id}</span></div>
                        <div class="meta-item"><span class="meta-label">Категория:</span><span class="meta-value">${p.category?.name || '—'}</span></div>
                        <div class="meta-item"><span class="meta-label">Наличие:</span><span class="meta-value">${inStock ? 'В наличии' : 'Под заказ'}</span></div>
                    </div>
                </div>
            </div>
            <div class="product-tabs">
                <div class="tabs-header">
                    <button class="tab-btn active" data-tab="description" onclick="switchTab('description')">Описание</button>
                    <button class="tab-btn" data-tab="specs" onclick="switchTab('specs')">Характеристики</button>
                </div>
                <div class="tab-content active" data-tab="description">
                    <p style="font-size:15px;line-height:1.7;color:var(--text)">${p.description || 'Описание отсутствует.'}</p>
                </div>
                <div class="tab-content" data-tab="specs">
                    <table class="specs-table">
                        <tr><td>Название</td><td>${p.name}</td></tr>
                        <tr><td>Артикул</td><td>#${p.id}</td></tr>
                        <tr><td>Категория</td><td>${p.category?.name || '—'}</td></tr>
                        <tr><td>Цена</td><td>${Number(p.price).toLocaleString('ru')} ₽</td></tr>
                        <tr><td>Наличие на складе</td><td>${p.stockQuantity} шт.</td></tr>
                        <tr><td>Дата добавления</td><td>${new Date(p.createdAt).toLocaleDateString('ru')}</td></tr>
                    </table>
                </div>
            </div>
        `;

        // Загружаем статус избранного с сервера
        loadFavoriteStatus(p.id);
    }

    if (customerToken) {
        document.getElementById('profile-link').textContent = 'Профиль';
        document.getElementById('profile-link').href = '/profile.html';
    }

    loadProduct();
</script>
</body>
</html>
