<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwagSoundShop — Сотрудники</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo"><span>панель управления</span>SwagSoundShop</div>
        <nav class="sidebar-nav">
            <a href="/dashboard.html" class="nav-item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Дашборд
            </a>
            <a href="/products.html" class="nav-item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                Товары
            </a>
            <a href="/orders.html" class="nav-item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                Заказы
            </a>
            <a href="/payments.html" class="nav-item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
                Платежи
            </a>
            <a href="/customers.html" class="nav-item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Клиенты
            </a>
            <a href="/employees.html" class="nav-item active">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                Сотрудники
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user" id="sidebar-user"></div>
            <button class="btn-logout" onclick="logout()">Выйти</button>
        </div>
    </aside>

    <main class="main">
        <div class="page-header">
            <h1 class="page-title">Сотрудники</h1>
            <p class="page-subtitle">Управление персоналом магазина</p>
        </div>

        <div class="card">
            <div class="toolbar">
                <div class="filters">
                    <div class="form-group">
                        <input class="form-control" id="search" placeholder="Поиск..." oninput="filterEmployees()">
                    </div>
                    <div class="form-group">
                        <select class="form-control" id="filter-role" onchange="filterEmployees()">
                            <option value="">Все роли</option>
                            <option value="ADMIN">Администратор</option>
                            <option value="MANAGER">Менеджер</option>
                            <option value="SELLER">Продавец</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="openModal()">+ Добавить сотрудника</button>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Имя</th>
                        <th>Email</th>
                        <th>Телефон</th>
                        <th>Роль</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody id="employees-table"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <div class="modal-title" id="modal-title">Добавить сотрудника</div>
        <input type="hidden" id="employee-id">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="form-group">
                <label class="form-label">Имя</label>
                <input class="form-control" id="emp-firstname" placeholder="Иван">
            </div>
            <div class="form-group">
                <label class="form-label">Фамилия</label>
                <input class="form-control" id="emp-lastname" placeholder="Иванов">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-control" id="emp-email" type="email" placeholder="ivan@swagsound.ru">
        </div>
        <div class="form-group">
            <label class="form-label">Пароль <span style="color:var(--text-muted);font-weight:400">(оставьте пустым чтобы не менять)</span></label>
            <input class="form-control" id="emp-password" type="password" placeholder="••••••••">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="form-group">
                <label class="form-label">Телефон</label>
                <input class="form-control" id="emp-phone" placeholder="+79001234567">
            </div>
            <div class="form-group">
                <label class="form-label">Роль</label>
                <select class="form-control" id="emp-role">
                    <option value="SELLER">Продавец</option>
                    <option value="MANAGER">Менеджер</option>
                    <option value="ADMIN">Администратор</option>
                </select>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
            <button class="btn btn-primary" onclick="saveEmployee()">Сохранить</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="/api.js"></script>
<script>
    checkAuth();
    document.getElementById('sidebar-user').textContent = localStorage.getItem('email');

    const isAdmin = hasRole('ADMIN');

    if (!isAdmin) {
        document.querySelector('button[onclick="openModal()"]')?.style.setProperty('display', 'none');
    }

    const roleLabels = { ADMIN: 'Администратор', MANAGER: 'Менеджер', SELLER: 'Продавец' };
    let allEmployees = [];

    function showToast(msg, type = 'success') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `toast ${type} show`;
        setTimeout(() => t.className = 'toast', 3000);
    }

    async function loadEmployees() {
        allEmployees = await get('/employees') || [];
        renderEmployees(allEmployees);
    }

    function filterEmployees() {
        const q = document.getElementById('search').value.toLowerCase();
        const role = document.getElementById('filter-role').value;
        const filtered = allEmployees.filter(e =>
            `${e.firstName} ${e.lastName} ${e.email}`.toLowerCase().includes(q) &&
            (!role || e.role === role)
        );
        renderEmployees(filtered);
    }

    function renderEmployees(employees) {
        const tbody = document.getElementById('employees-table');
        if (!employees.length) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted)">Сотрудников нет</td></tr>';
            return;
        }
        tbody.innerHTML = employees.map(e => `
        <tr>
            <td style="color:var(--text-muted)">#${e.id}</td>
            <td><strong>${e.firstName} ${e.lastName}</strong></td>
            <td>${e.email}</td>
            <td>${e.phone || '—'}</td>
            <td><span class="badge badge-${e.role?.toLowerCase()}">${roleLabels[e.role] || e.role}</span></td>
            <td>
                <div style="display:flex;gap:8px">
                    ${isAdmin ? `<button class="btn btn-secondary btn-sm" onclick="editEmployee(${e.id})">Изменить</button>` : ''}
                    ${isAdmin ? `<button class="btn btn-danger btn-sm" onclick="deleteEmployee(${e.id})">Удалить</button>` : ''}
                    ${!isAdmin ? '<span style="color:var(--text-muted);font-size:13px">Только просмотр</span>' : ''}
                </div>
            </td>
        </tr>
    `).join('');
    }

    function openModal(employee = null) {
        document.getElementById('modal-title').textContent = employee ? 'Редактировать сотрудника' : 'Добавить сотрудника';
        document.getElementById('employee-id').value = employee?.id || '';
        document.getElementById('emp-firstname').value = employee?.firstName || '';
        document.getElementById('emp-lastname').value = employee?.lastName || '';
        document.getElementById('emp-email').value = employee?.email || '';
        document.getElementById('emp-password').value = '';
        document.getElementById('emp-phone').value = employee?.phone || '';
        document.getElementById('emp-role').value = employee?.role || 'SELLER';
        document.getElementById('modal').classList.add('open');
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('open');
    }

    function editEmployee(id) {
        const e = allEmployees.find(e => e.id === id);
        if (e) openModal(e);
    }

    async function saveEmployee() {
        const id = document.getElementById('employee-id').value;
        const body = {
            firstName: document.getElementById('emp-firstname').value,
            lastName: document.getElementById('emp-lastname').value,
            email: document.getElementById('emp-email').value,
            password: document.getElementById('emp-password').value,
            phone: document.getElementById('emp-phone').value,
            role: document.getElementById('emp-role').value
        };

        if (!body.firstName || !body.lastName || !body.email) {
            showToast('Заполните обязательные поля', 'error');
            return;
        }

        if (id) {
            await put(`/employees/${id}`, body);
            showToast('Сотрудник обновлён');
        } else {
            if (!body.password) { showToast('Введите пароль', 'error'); return; }
            await post('/employees', body);
            showToast('Сотрудник добавлен');
        }

        closeModal();
        loadEmployees();
    }

    async function deleteEmployee(id) {
        if (!confirm('Удалить сотрудника?')) return;
        await del(`/employees/${id}`);
        showToast('Сотрудник удалён');
        loadEmployees();
    }

    document.getElementById('modal').addEventListener('click', e => {
        if (e.target === document.getElementById('modal')) closeModal();
    });

    loadEmployees();
</script>
</body>
</html>
