<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwagSoundShop — Заказы</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo"><span>панель управления</span>SwagSoundShop</div>
        <nav class="sidebar-nav">
            <a href="/dashboard.html" class="nav-item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Дашборд
            </a>
            <a href="/products.html" class="nav-item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                Товары
            </a>
            <a href="/orders.html" class="nav-item active">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                Заказы
            </a>
            <a href="/payments.html" class="nav-item" id="nav-payments">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
                Платежи
            </a>
            <a href="/customers.html" class="nav-item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Клиенты
            </a>
            <a href="/employees.html" class="nav-item" id="nav-employees">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                Сотрудники
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user" id="sidebar-user"></div>
            <button class="btn-logout" onclick="logout()">Выйти</button>
        </div>
    </aside>

    <main class="main">
        <div class="page-header">
            <h1 class="page-title">Заказы</h1>
            <p class="page-subtitle">Управление заказами магазина</p>
        </div>

        <div class="card">
            <div class="toolbar">
                <div class="filters">
                    <div class="form-group">
                        <select class="form-control" id="filter-status" onchange="loadOrders()">
                            <option value="">Все статусы</option>
                            <option value="NEW">Новый</option>
                            <option value="IN_PROGRESS">В работе</option>
                            <option value="PAID">Оплачен</option>
                            <option value="SHIPPED">Отправлен</option>
                            <option value="DELIVERED">Доставлен</option>
                            <option value="CANCELLED">Отменён</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="openCreateModal()">+ Новый заказ</button>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Клиент</th>
                        <th>Сумма</th>
                        <th>Статус</th>
                        <th>Дата</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody id="orders-table"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- CREATE MODAL -->
<div class="modal-overlay" id="create-modal">
    <div class="modal">
        <div class="modal-title">Новый заказ</div>
        <div class="form-group">
            <label class="form-label">Клиент</label>
            <select class="form-control" id="order-customer"></select>
        </div>
        <div id="order-items-list"></div>
        <button class="btn btn-secondary btn-sm" onclick="addItem()" style="margin-bottom:16px">+ Добавить товар</button>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeCreateModal()">Отмена</button>
            <button class="btn btn-primary" onclick="createOrder()">Создать заказ</button>
        </div>
    </div>
</div>

<!-- STATUS MODAL -->
<div class="modal-overlay" id="status-modal">
    <div class="modal">
        <div class="modal-title">Изменить статус</div>
        <input type="hidden" id="status-order-id">
        <div class="form-group">
            <label class="form-label">Новый статус</label>
            <select class="form-control" id="new-status">
                <option value="NEW">Новый</option>
                <option value="IN_PROGRESS">В работе</option>
                <option value="PAID">Оплачен</option>
                <option value="SHIPPED">Отправлен</option>
                <option value="DELIVERED">Доставлен</option>
                <option value="CANCELLED">Отменён</option>
            </select>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeStatusModal()">Отмена</button>
            <button class="btn btn-primary" onclick="updateStatus()">Сохранить</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="/api.js"></script>
<script>
    checkAuth();
    if (hasRole('SELLER')) {
        document.getElementById('nav-payments')?.remove();
        document.getElementById('nav-employees')?.remove();
        document.querySelector('button[onclick="openCreateModal()"]').style.display = 'none';

    }
    document.getElementById('sidebar-user').textContent = localStorage.getItem('email');

    const statusLabels = {
        NEW: 'Новый', IN_PROGRESS: 'В работе', PAID: 'Оплачен',
        SHIPPED: 'Отправлен', DELIVERED: 'Доставлен', CANCELLED: 'Отменён'
    };

    let allProducts = [], orderItems = [];

    function showToast(msg, type = 'success') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `toast ${type} show`;
        setTimeout(() => t.className = 'toast', 3000);
    }

    async function loadOrders() {
        const statusFilter = document.getElementById('filter-status').value;
        let orders = await get('/orders') || [];
        if (statusFilter) orders = orders.filter(o => o.status === statusFilter);

        const tbody = document.getElementById('orders-table');
        if (!orders.length) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted)">Заказов нет</td></tr>';
            return;
        }

        tbody.innerHTML = orders.map(o => `
        <tr>
            <td style="color:var(--text-muted)">#${o.id}</td>
            <td><strong>${o.customer?.firstName} ${o.customer?.lastName}</strong><br>
                <span style="font-size:12px;color:var(--text-muted)">${o.customer?.email}</span></td>
            <td><strong>${Number(o.totalAmount).toLocaleString('ru')} ₽</strong></td>
            <td><span class="badge badge-${o.status?.toLowerCase()}">${statusLabels[o.status] || o.status}</span></td>
            <td style="color:var(--text-muted);font-size:13px">${new Date(o.orderDate).toLocaleDateString('ru')}</td>
            <td>
                <button class="btn btn-secondary btn-sm" onclick="openStatusModal(${o.id}, '${o.status}')">Статус</button>
            </td>
        </tr>
    `).join('');
    }

    async function openCreateModal() {
        orderItems = [];
        const customers = await get('/customers') || [];
        allProducts = await get('/products') || [];

        const sel = document.getElementById('order-customer');
        sel.innerHTML = customers.map(c => `<option value="${c.id}">${c.firstName} ${c.lastName}</option>`).join('');

        renderItems();
        document.getElementById('create-modal').classList.add('open');
    }

    function closeCreateModal() {
        document.getElementById('create-modal').classList.remove('open');
    }

    function addItem() {
        orderItems.push({ productId: allProducts[0]?.id, quantity: 1 });
        renderItems();
    }

    function renderItems() {
        document.getElementById('order-items-list').innerHTML = orderItems.map((item, i) => `
        <div style="display:grid;grid-template-columns:1fr auto auto;gap:8px;margin-bottom:8px;align-items:center">
            <select class="form-control" onchange="orderItems[${i}].productId=parseInt(this.value)">
                ${allProducts.map(p => `<option value="${p.id}" ${p.id==item.productId?'selected':''}>${p.name} — ${Number(p.price).toLocaleString('ru')} ₽</option>`).join('')}
            </select>
            <input class="form-control" type="number" value="${item.quantity}" min="1" style="width:70px"
                onchange="orderItems[${i}].quantity=parseInt(this.value)">
            <button class="btn btn-danger btn-sm" onclick="orderItems.splice(${i},1);renderItems()">✕</button>
        </div>
    `).join('') || '<p style="color:var(--text-muted);font-size:13px;margin-bottom:12px">Добавьте товары в заказ</p>';
    }

    async function createOrder() {
        if (!orderItems.length) { showToast('Добавьте товары', 'error'); return; }
        const customerId = parseInt(document.getElementById('order-customer').value);
        await post('/orders', { customerId, items: orderItems });
        showToast('Заказ создан');
        closeCreateModal();
        loadOrders();
    }

    function openStatusModal(id, currentStatus) {
        document.getElementById('status-order-id').value = id;
        document.getElementById('new-status').value = currentStatus;
        document.getElementById('status-modal').classList.add('open');
    }

    function closeStatusModal() {
        document.getElementById('status-modal').classList.remove('open');
    }

    async function updateStatus() {
        const id = document.getElementById('status-order-id').value;
        const status = document.getElementById('new-status').value;
        await patch(`/orders/${id}/status?status=${status}`);
        showToast('Статус обновлён');
        closeStatusModal();
        loadOrders();
    }

    loadOrders();
</script>
</body>
</html>
