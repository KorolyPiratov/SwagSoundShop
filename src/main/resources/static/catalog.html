<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwagSoundShop — Каталог</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        body { background: var(--honeydew); }
        .navbar {
            background: white;
            padding: 0 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .navbar-logo { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--tomato); text-decoration: none; }
        .navbar-links { display: flex; gap: 32px; list-style: none; }
        .navbar-links a { text-decoration: none; color: var(--text); font-size: 14px; font-weight: 500; transition: color 0.2s; }
        .navbar-links a:hover, .navbar-links a.active { color: var(--tomato); }
        .cart-btn { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--tomato); color: white; border-radius: var(--radius-sm); text-decoration: none; font-size: 14px; font-weight: 500; transition: background 0.2s; }
        .cart-btn:hover { background: #b02e30; }
        .cart-count { background: var(--peach); color: var(--text); border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }

        .catalog-layout { display: grid; grid-template-columns: 260px 1fr; gap: 32px; padding: 40px 48px; }

        .filters-panel { background: white; border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); height: fit-content; position: sticky; top: 84px; border: 1px solid var(--border); }

        .filter-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--tomato); margin-bottom: 20px; }
        .filter-section { margin-bottom: 20px; }
        .filter-section-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px; }

        .category-filter-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; cursor: pointer; font-size: 14px; transition: color 0.2s; }
        .category-filter-item:hover { color: var(--tomato); }
        .category-filter-item.active { color: var(--tomato); font-weight: 600; }

        .price-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        .catalog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .catalog-title { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--tomato); }
        .catalog-count { font-size: 14px; color: var(--text-muted); }

        .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }

        .product-card { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); transition: all 0.2s; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.1); }
        .product-img { height: 160px; background: linear-gradient(135deg, var(--honeydew), var(--peach)); display: flex; align-items: center; justify-content: center; font-size: 56px; }
        .product-body { padding: 16px; }
        .product-category { font-size: 11px; color: var(--coral); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .product-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
        .product-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
        .product-footer { display: flex; justify-content: space-between; align-items: center; }
        .product-price { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--tomato); }
        .product-stock { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .btn-add-cart { padding: 8px 16px; background: var(--tomato); color: white; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s; }
        .btn-add-cart:hover { background: #b02e30; }
        .btn-add-cart:disabled { background: #ccc; cursor: not-allowed; }

        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--tomato); color: white; padding: 14px 20px; border-radius: var(--radius-sm); font-size: 14px; z-index: 9999; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: #16a34a; }

        .btn-reset { width: 100%; padding: 8px; background: #f5f5f5; border: none; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 8px; transition: background 0.2s; }
        .btn-reset:hover { background: #eee; }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="/index.html" class="navbar-logo">SwagSoundShop</a>
    <ul class="navbar-links">
        <li><a href="/index.html">Главная</a></li>
        <li><a href="/catalog.html">Каталог</a></li>
        <li><a href="/login.html">Войти</a></li>
    </ul>
    <div>
        <a href="/cart.html" class="cart-btn">
            🛒 Корзина
            <span class="cart-count" id="cart-count">0</span>
        </a>
    </div>
</nav>

<div class="catalog-layout">
    <!-- FILTERS -->
    <aside class="filters-panel">
        <div class="filter-title">Фильтры</div>

        <div class="filter-section">
            <div class="filter-section-title">Категория</div>
            <div id="category-filters">Загрузка...</div>
        </div>

        <div class="filter-section">
            <div class="filter-section-title">Цена</div>
            <div class="price-inputs">
                <input class="form-control" id="price-min" type="number" placeholder="От" oninput="applyFilters()">
                <input class="form-control" id="price-max" type="number" placeholder="До" oninput="applyFilters()">
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-section-title">Поиск</div>
            <input class="form-control" id="search" placeholder="Название товара..." oninput="applyFilters()">
        </div>

        <button class="btn-reset" onclick="resetFilters()">Сбросить фильтры</button>
    </aside>

    <!-- PRODUCTS -->
    <div>
        <div class="catalog-header">
            <div class="catalog-title">Каталог</div>
            <div class="catalog-count" id="catalog-count"></div>
        </div>
        <div class="products-grid" id="products-grid">
            <div style="color:var(--text-muted)">Загрузка...</div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const categoryIcons = {
        'Гитары': '🎸', 'Клавишные': '🎹', 'Ударные': '🥁',
        'Аксессуары': '🎵', 'Акустические': '🪕', 'Электрогитары': '⚡',
        'Синтезаторы': '🎛️', 'Пианино': '🎹'
    };

    let allProducts = [];
    let selectedCategory = null;

    function getCart() { return JSON.parse(localStorage.getItem('cart') || '[]'); }
    function saveCart(cart) { localStorage.setItem('cart', JSON.stringify(cart)); updateCartCount(); }
    function updateCartCount() {
        const count = getCart().reduce((s, i) => s + i.quantity, 0);
        document.getElementById('cart-count').textContent = count;
    }

    function showToast(msg, type = 'success') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `toast ${type} show`;
        setTimeout(() => t.className = 'toast', 3000);
    }

    function addToCart(product) {
        const cart = getCart();
        const existing = cart.find(i => i.id === product.id);
        if (existing) existing.quantity++;
        else cart.push({ ...product, quantity: 1 });
        saveCart(cart);
        showToast(`${product.name} добавлен в корзину`);
    }

    function applyFilters() {
        const search = document.getElementById('search').value.toLowerCase();
        const minPrice = parseFloat(document.getElementById('price-min').value) || 0;
        const maxPrice = parseFloat(document.getElementById('price-max').value) || Infinity;

        const filtered = allProducts.filter(p => {
            if (search && !p.name.toLowerCase().includes(search)) return false;
            if (p.price < minPrice || p.price > maxPrice) return false;
            if (selectedCategory && p.category?.id !== selectedCategory) return false;
            return true;
        });

        renderProducts(filtered);
    }

    function renderProducts(products) {
        document.getElementById('catalog-count').textContent = `${products.length} товаров`;
        if (!products.length) {
            document.getElementById('products-grid').innerHTML =
                '<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-muted)">Товары не найдены</div>';
            return;
        }
        document.getElementById('products-grid').innerHTML = products.map(p => `
        <a href="/product-detail.html?id=${p.id}" style="text-decoration: none; color: inherit;">
        <div class="product-card">
            <div class="product-img">${categoryIcons[p.category?.name] || '🎵'}</div>
            <div class="product-body">
                <div class="product-category">${p.category?.name || ''}</div>
                <div class="product-name">${p.name}</div>
                <div class="product-desc">${p.description || ''}</div>
                <div class="product-footer">
                    <div>
                        <div class="product-price">${Number(p.price).toLocaleString('ru')} ₽</div>
                        <div class="product-stock">${p.stockQuantity > 0 ? `В наличии: ${p.stockQuantity} шт.` : 'Нет в наличии'}</div>
                    </div>
                    <button class="btn-add-cart"
                        ${p.stockQuantity === 0 ? 'disabled' : ''}
                        onclick='addToCart(${JSON.stringify({id: p.id, name: p.name, price: p.price})})'>
                        В корзину
                    </button>
                </div>
            </div>
        </div>
    `).join('');
    }

    function selectCategory(id) {
        selectedCategory = id;
        document.querySelectorAll('.category-filter-item').forEach(el => {
            el.classList.toggle('active', parseInt(el.dataset.id) === id || (id === null && el.dataset.id === 'all'));
        });
        applyFilters();
    }

    function resetFilters() {
        selectedCategory = null;
        document.getElementById('search').value = '';
        document.getElementById('price-min').value = '';
        document.getElementById('price-max').value = '';
        document.querySelectorAll('.category-filter-item').forEach(el => {
            el.classList.toggle('active', el.dataset.id === 'all');
        });
        renderProducts(allProducts);
    }

    async function init() {
        const [productsRes, categoriesRes] = await Promise.all([
            fetch('http://localhost:8080/api/products'),
            fetch('http://localhost:8080/api/categories')
        ]);

        allProducts = await productsRes.json();
        const categories = await categoriesRes.json();

        // Проверяем URL параметр
        const urlParams = new URLSearchParams(window.location.search);
        const categoryParam = urlParams.get('category');
        if (categoryParam) selectedCategory = parseInt(categoryParam);

        // Рендерим фильтры категорий
        const rootCats = categories.filter(c => !c.parent);
        document.getElementById('category-filters').innerHTML = `
        <div class="category-filter-item ${!selectedCategory ? 'active' : ''}" data-id="all" onclick="selectCategory(null)">
            Все товары
        </div>
        ${rootCats.map(c => `
            <div class="category-filter-item ${selectedCategory === c.id ? 'active' : ''}" data-id="${c.id}" onclick="selectCategory(${c.id})">
                ${categoryIcons[c.name] || '🎵'} ${c.name}
            </div>
        `).join('')}
    `;

        applyFilters();
        updateCartCount();
    }

    init();
</script>
</body>
</html>
