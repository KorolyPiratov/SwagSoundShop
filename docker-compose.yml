services:
  postgres:
    image: postgres:16
    container_name: swagsoundshop-db
    environment:
      POSTGRES_DB: ssswagsoundshop
      POSTGRES_USER: swaguser
      POSTGRES_PASSWORD: swagpass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swaguser -d ssswagsoundshop"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: swagsoundshop-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ssswagsoundshop
      SPRING_DATASOURCE_USERNAME: swaguser
      SPRING_DATASOURCE_PASSWORD: swagpass
      APP_JWT_SECRET: swagSoundShopSecretKey2025SuperLongSecretForJWT
      APP_JWT_EXPIRATION: 86400000
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data: